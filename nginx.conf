# Nginx Configuration for Faculty WLM
# Production deployment with /csefaculty base path
# SPA routing with proper cache headers and API proxy

server {
    listen 80;
    server_name 160.187.169.41;
    
    # Maximum upload size
    client_max_body_size 50M;

    # ──────────────────────────────────────────────────────────
    # React Frontend Routes (/csefaculty)
    # ──────────────────────────────────────────────────────────
    
    location /csefaculty/ {
        # Static file directory
        alias /var/www/html/csefaculty/;
        
        # SPA routing: try file, then directory, then index.html
        try_files $uri $uri/ /csefaculty/index.html;
        
        # Cache control for index.html
        location /csefaculty/index.html {
            add_header Cache-Control "public, max-age=0, must-revalidate";
            add_header X-Content-Type-Options "nosniff";
        }
        
        # Cache static assets with hash (forever)
        location /csefaculty/static/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }
        
        # Cache images with moderate TTL
        location /csefaculty/ {
            add_header Cache-Control "public, max-age=3600";
            expires 1h;
        }
        
        # Disable caching for service worker
        location /csefaculty/service-worker.js {
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }
    }

    # ──────────────────────────────────────────────────────────
    # API Routes (/deva)
    # Route to backend server running on port 5000
    # ──────────────────────────────────────────────────────────
    
    location /deva/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Redirect handling
        proxy_redirect off;
        proxy_redirect http://localhost:5000/ /;
    }

    # Alternative: Production base URL (optional if using different host)
    location /csefaculty/deva/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # Rewrite path to remove /csefaculty prefix
        rewrite ^/csefaculty/deva(.*) /deva$1 break;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────────────────────────────────
    # Root redirect
    # ──────────────────────────────────────────────────────────
    
    location = / {
        return 301 /csefaculty/;
    }

    # ──────────────────────────────────────────────────────────
    # Health check
    # ──────────────────────────────────────────────────────────
    
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ──────────────────────────────────────────────────────────
    # Logging
    # ──────────────────────────────────────────────────────────
    
    access_log /var/log/nginx/csefaculty_access.log;
    error_log /var/log/nginx/csefaculty_error.log;
}
