# Apache Configuration for Faculty WLM Production
# Deploy to /var/www/html/csefaculty/
# Place this in sites-available and enable with: a2ensite csefaculty

<VirtualHost *:80>
    ServerName 160.187.169.41
    ServerAdmin admin@vignan.ac.in
    
    # Document root
    DocumentRoot /var/www/html
    
    # ──────────────────────────────────────────────────────────
    # Mod Rewrite - Enable for SPA routing
    # ──────────────────────────────────────────────────────────
    
    <Directory /var/www/html/csefaculty>
        Options -MultiViews
        RewriteEngine On
        
        # SPA Routing: if not a real file or directory, serve index.html
        RewriteCond %{REQUEST_FILENAME} -d [OR]
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [QSA,L]
        RewriteRule ^ index.html [QSA,L]
        
        # Allow all access
        AllowOverride All
        Require all granted
    </Directory>

    # ──────────────────────────────────────────────────────────
    # Root redirect
    # ──────────────────────────────────────────────────────────
    
    <Directory /var/www/html>
        RewriteEngine On
        RewriteRule ^/?$ /csefaculty/ [R=301,L]
    </Directory>

    # ──────────────────────────────────────────────────────────
    # Cache headers for static assets
    # ──────────────────────────────────────────────────────────
    
    <FilesMatch "^.*\.js\.map$">
        Header set Cache-Control "public, max-age=0, must-revalidate"
    </FilesMatch>
    
    <FilesMatch "^.*\.js$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    
    <FilesMatch "^.*\.css$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    
    <FilesMatch "^.*\.(png|jpg|jpeg|gif|svg|webp)$">
        Header set Cache-Control "public, max-age=3600"
    </FilesMatch>
    
    <FilesMatch "^index\.html$">
        Header set Cache-Control "public, max-age=0, must-revalidate"
    </FilesMatch>

    # ──────────────────────────────────────────────────────────
    # MIME types
    # ──────────────────────────────────────────────────────────
    
    <FilesMatch "\.js$">
        AddType application/javascript
    </FilesMatch>
    
    <FilesMatch "\.webp$">
        AddType image/webp
    </FilesMatch>
    
    <FilesMatch "\.woff$">
        AddType font/woff
    </FilesMatch>
    
    <FilesMatch "\.woff2$">
        AddType font/woff2
    </FilesMatch>

    # ──────────────────────────────────────────────────────────
    # Proxy to Backend API (/deva)
    # ──────────────────────────────────────────────────────────
    
    <Location /deva>
        ProxyPreserveHost On
        ProxyPass http://localhost:5000/deva
        ProxyPassReverse http://localhost:5000/deva
        ProxyTimeout 3600
        
        # Headers
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}e"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}e"
    </Location>

    <Location /csefaculty/deva>
        ProxyPreserveHost On
        ProxyPass http://localhost:5000/deva
        ProxyPassReverse http://localhost:5000/deva timeout=3600
        
        # Rewrite module already handles path
        ProxyPassReverse / /csefaculty/deva/
        
        # Headers
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}e"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}e"
    </Location>

    # ──────────────────────────────────────────────────────────
    # Security headers
    # ──────────────────────────────────────────────────────────
    
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-XSS-Protection "1; mode=block"

    # ──────────────────────────────────────────────────────────
    # Logging
    # ──────────────────────────────────────────────────────────
    
    ErrorLog ${APACHE_LOG_DIR}/csefaculty_error.log
    CustomLog ${APACHE_LOG_DIR}/csefaculty_access.log combined
</VirtualHost>

# Enable Apache modules needed:
# sudo a2enmod rewrite
# sudo a2enmod proxy
# sudo a2enmod proxy_http
# sudo a2enmod headers
